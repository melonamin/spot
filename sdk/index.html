<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#5a4bf0">
  <title>Spot — drop a folder, get a spot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --field: #5a4bf0;
      --grid: rgba(255, 255, 255, .09);
      --ink: #15121e;
      --card: #fffefb;
      --mutedink: #8d879b;
      --accent: #5a4bf0;
      --go: #23b14d;
      --bad: #d92d2d;
      --font-logo: 'Pacifico', 'Brush Script MT', cursive;
      --font-mono: 'Space Mono', ui-monospace, 'SF Mono', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(var(--grid) 1.5px, transparent 1.5px),
        linear-gradient(90deg, var(--grid) 1.5px, transparent 1.5px),
        var(--field);
      background-size: 44px 44px, 44px 44px, auto;
    }

    .stage {
      min-height: 100svh;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* The logo is three stacked copies of the same text: an offset
       thick-stroke copy (hard shadow), a thick-stroke copy in place
       (outline), and the element's own white text on top. */
    .logo {
      position: relative;
      z-index: 0;
      margin: 0;
      font: 400 clamp(64px, 13vw, 104px)/1.35 var(--font-logo);
      color: #fff;
      text-align: center;
    }
    .logo::before,
    .logo::after {
      content: attr(data-text);
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      color: var(--ink);
      -webkit-text-stroke: .14em var(--ink);
    }
    .logo::after { transform: translate(.05em, .07em); z-index: -2; }
    .logo::before { z-index: -1; }

    .tagline {
      /* Pacifico descenders (and their stroke) reach well below the
         logo's line box; keep the tagline clear of them. */
      margin: 40px 0 44px;
      font: 700 13px/1.6 var(--font-mono);
      letter-spacing: .32em;
      text-transform: uppercase;
      text-align: center;
      color: rgba(255, 255, 255, .92);
    }

    .card {
      width: min(640px, 100%);
      position: relative;
      background: var(--card);
      border: 3px solid var(--ink);
      border-radius: 24px;
      box-shadow: 10px 12px 0 var(--ink);
      padding: 48px 32px;
      text-align: center;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .card.clickable { cursor: pointer; }
    .card.dragover {
      transform: translate(-3px, -4px);
      box-shadow: 13px 16px 0 var(--ink);
      background: #f3f1ff;
    }
    .card.dragover::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 3px dashed var(--accent);
      border-radius: 16px;
      pointer-events: none;
    }

    .pick {
      width: 68px; height: 68px;
      margin: 0 auto 28px;
      border: 0;
      border-radius: 18px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      animation: float 2.6s ease-in-out infinite;
    }
    @keyframes float { 50% { transform: translateY(-6px); } }

    .pick:focus-visible,
    .launch:focus-visible,
    .linkish:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 3px;
    }
    .card.dragover .pick, .card:hover .pick { animation-play-state: paused; transform: translateY(-6px); }

    .shout {
      margin: 0;
      font: 700 clamp(17px, 3.4vw, 23px)/1.5 var(--font-mono);
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .hint {
      margin: 12px 0 0;
      font: 700 14px/1.6 var(--font-mono);
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--mutedink);
    }

    .linkish {
      border: 0;
      background: none;
      padding: 0;
      cursor: pointer;
      font: 400 13px/1.6 var(--font-mono);
      color: var(--mutedink);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .linkish:hover { color: var(--ink); }
    .repick { margin: 24px 0 0; }

    .livelink {
      margin: 20px 0 0;
      font: 700 clamp(14px, 2.6vw, 18px)/1.7 var(--font-mono);
    }
    .livelink a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 4px;
      word-break: break-all;
    }

    .error {
      margin: 26px 0 0;
      font: 700 13px/1.6 var(--font-mono);
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--bad);
    }
    @keyframes shake {
      20% { transform: translateX(-9px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(4px); }
    }
    .card.shake { animation: shake .4s ease both; }

    .launchrow {
      display: flex;
      gap: 18px;
      width: min(640px, 100%);
      margin-top: 28px;
    }
    /* display:flex above would defeat the hidden attribute */
    .launchrow[hidden] { display: none; }
    .namebox {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      background: var(--card);
      border: 3px solid var(--ink);
      border-radius: 16px;
      box-shadow: 7px 8px 0 var(--ink);
      padding: 0 18px;
      cursor: text;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .namebox:focus-within {
      transform: translate(-2px, -2px);
      box-shadow: 9px 10px 0 var(--ink);
    }
    #sitename {
      flex: 1;
      min-width: 0;
      border: 0;
      background: none;
      outline: 0;
      padding: 19px 0;
      font: 700 16px/1 var(--font-mono);
      color: var(--ink);
    }
    #sitename::placeholder { color: var(--mutedink); opacity: .7; }
    .suffix {
      font: 700 16px/1 var(--font-mono);
      color: var(--mutedink);
      white-space: nowrap;
      user-select: none;
    }
    .launch {
      border: 3px solid var(--ink);
      border-radius: 16px;
      background: var(--go);
      color: #fff;
      font: 700 16px/1 var(--font-mono);
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 0 30px;
      box-shadow: 7px 8px 0 var(--ink);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .launch:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 9px 10px 0 var(--ink); }
    .launch:active:not(:disabled) { transform: translate(3px, 4px); box-shadow: 2px 2px 0 var(--ink); }
    .launch:disabled { opacity: .8; cursor: wait; }

    footer {
      margin-top: 48px;
      font: 400 12px/2 var(--font-mono);
      color: rgba(255, 255, 255, .82);
      text-align: center;
    }
    footer code {
      background: rgba(0, 0, 0, .28);
      padding: 2px 7px;
      border-radius: 6px;
    }

    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }
    #confetti i {
      position: absolute;
      top: -3vh;
      display: block;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(108vh) rotate(var(--spin)); }
    }

    @media (max-width: 560px) {
      .launchrow { flex-direction: column; }
      .launch { padding: 19px 30px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1 class="logo" data-text="Spot">Spot</h1>
    <p class="tagline">Drop a folder, get a spot.</p>

    <main class="card clickable" id="card" aria-live="polite">
      <section id="idle">
        <button type="button" class="pick" id="pick" aria-label="Choose a folder to deploy">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
        <h2 class="shout">Drop your folder here</h2>
        <p class="hint">HTML&nbsp;•&nbsp;JS&nbsp;•&nbsp;CSS</p>
      </section>

      <section id="ready" hidden>
        <h2 class="shout" id="summary"></h2>
        <p class="hint" id="detail"></p>
        <p class="repick"><button type="button" class="linkish" id="repick">pick a different folder</button></p>
      </section>

      <section id="live" hidden>
        <h2 class="shout">Your site is live!</h2>
        <p class="livelink">👉 <a id="liveurl" target="_blank" rel="noopener"></a> 👈</p>
        <p class="repick"><button type="button" class="linkish" id="again">deploy another</button></p>
      </section>

      <p class="error" id="error" role="alert" hidden></p>
    </main>

    <form class="launchrow" id="launchrow" hidden>
      <label class="namebox" for="sitename">
        <input id="sitename" name="site" aria-label="Site name" autocomplete="off"
               autocapitalize="off" spellcheck="false" maxlength="63" placeholder="my-site">
        <span class="suffix" id="suffix"></span>
      </label>
      <button class="launch" id="launch" type="submit">Launch</button>
    </form>

    <footer>
      prefer a terminal? <code>spot deploy &lt;name&gt;</code> ships the current folder
      &nbsp;·&nbsp; <code>spot init</code> teaches your coding agent the SDK
    </footer>
  </div>

  <input type="file" id="filepick" webkitdirectory hidden>
  <div id="confetti" aria-hidden="true"></div>

  <script>
    (() => {
      'use strict';
      const $ = (id) => document.getElementById(id);
      const card = $('card'), idle = $('idle'), ready = $('ready'), live = $('live');
      const launchRow = $('launchrow'), nameInput = $('sitename'), launchBtn = $('launch');
      const errorEl = $('error'), filePick = $('filepick');

      $('suffix').textContent = '.' + location.host;

      let picked = [];        // [{ path, file }], paths site-relative
      let launching = false;

      const junkSeg = (seg) => seg.startsWith('.') || seg === 'node_modules' || seg === 'Thumbs.db';
      const isJunk = (path) => path.split('/').some(junkSeg);

      const show = (section) => {
        for (const el of [idle, ready, live]) el.hidden = el !== section;
        launchRow.hidden = section !== ready;
        card.classList.toggle('clickable', section === idle);
      };

      const fail = (message) => {
        errorEl.textContent = message;
        errorEl.hidden = false;
        card.classList.remove('shake');
        void card.offsetWidth; // restart the animation
        card.classList.add('shake');
      };
      const clearError = () => { errorEl.hidden = true; };

      const sanitizeName = (raw) => raw.toLowerCase()
        .replace(/[^a-z0-9-]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 63);

      const ADJECTIVES = ['quick', 'sunny', 'fuzzy', 'brave', 'mellow', 'zesty', 'cosmic', 'tiny', 'golden', 'peppy'];
      const NOUNS = ['lunch', 'otter', 'comet', 'pickle', 'breeze', 'waffle', 'meadow', 'rocket', 'noodle', 'spark'];
      const randomName = () => {
        const pick = (list) => list[Math.floor(Math.random() * list.length)];
        return pick(ADJECTIVES) + '-' + pick(NOUNS);
      };

      const fmtSize = (bytes) => {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
        return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      };

      const setFiles = (files, suggestion) => {
        clearError();
        let list = files.filter((f) => !isJunk(f.path));
        if (!list.length) return fail('That folder is empty');
        let root = '';
        // Mirror of the server's normalization, for instant feedback:
        // strip folder wrapping until index.html sits at the root.
        while (!list.some((f) => f.path === 'index.html')) {
          const first = list[0].path.split('/')[0];
          if (!list.every((f) => f.path.startsWith(first + '/'))) {
            return fail('No index.html at the root of that folder');
          }
          root = root || first;
          list = list.map((f) => ({ path: f.path.slice(first.length + 1), file: f.file }));
        }
        picked = list;
        const total = list.reduce((n, f) => n + f.file.size, 0);
        $('summary').textContent = list.length + ' file' + (list.length === 1 ? '' : 's') + ' ready to deploy';
        $('detail').textContent = fmtSize(total);
        nameInput.value = sanitizeName(suggestion || root) || randomName();
        show(ready);
        nameInput.focus();
        nameInput.select();
      };

      // --- picking --------------------------------------------------------
      const openPicker = () => filePick.click();
      $('pick').addEventListener('click', (e) => { e.stopPropagation(); openPicker(); });
      card.addEventListener('click', () => { if (!idle.hidden) openPicker(); });
      $('repick').addEventListener('click', openPicker);
      $('again').addEventListener('click', () => {
        picked = [];
        filePick.value = '';
        clearError();
        show(idle);
      });

      filePick.addEventListener('change', () => {
        const files = [...filePick.files].map((file) => ({
          path: file.webkitRelativePath || file.name,
          file,
        }));
        if (files.length) setFiles(files, '');
      });

      // --- drag and drop ----------------------------------------------------
      let dragDepth = 0;
      window.addEventListener('dragover', (e) => e.preventDefault());
      window.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragDepth++;
        if (!launching) card.classList.add('dragover');
      });
      window.addEventListener('dragleave', () => {
        if (--dragDepth <= 0) {
          dragDepth = 0;
          card.classList.remove('dragover');
        }
      });
      window.addEventListener('drop', async (e) => {
        e.preventDefault();
        dragDepth = 0;
        card.classList.remove('dragover');
        if (launching) return;
        try {
          const { files, suggestion } = await collectDrop(e.dataTransfer);
          if (files.length) setFiles(files, suggestion);
        } catch {
          fail('Could not read the dropped folder');
        }
      });

      const collectDrop = async (dt) => {
        // webkitGetAsEntry only works synchronously, before any await.
        const entries = [...dt.items]
          .filter((item) => item.kind === 'file')
          .map((item) => item.webkitGetAsEntry && item.webkitGetAsEntry())
          .filter(Boolean);
        if (!entries.length) {
          return { files: [...dt.files].map((file) => ({ path: file.name, file })), suggestion: '' };
        }
        const files = [];
        for (const entry of entries) await walk(entry, '', files);
        const suggestion = entries.length === 1 && entries[0].isDirectory ? entries[0].name : '';
        return { files, suggestion };
      };

      const walk = async (entry, prefix, out) => {
        if (entry.isFile) {
          const file = await new Promise((res, rej) => entry.file(res, rej));
          out.push({ path: prefix + entry.name, file });
        } else if (entry.isDirectory) {
          if (junkSeg(entry.name)) return;
          const reader = entry.createReader();
          for (;;) {
            // readEntries returns at most ~100 entries per call; drain it.
            const batch = await new Promise((res, rej) => reader.readEntries(res, rej));
            if (!batch.length) break;
            for (const child of batch) await walk(child, prefix + entry.name + '/', out);
          }
        }
      };

      // --- launching --------------------------------------------------------
      nameInput.addEventListener('input', () => {
        clearError();
        const clean = nameInput.value.toLowerCase().replace(/[^a-z0-9-]+/g, '-');
        if (clean !== nameInput.value) nameInput.value = clean;
      });

      launchRow.addEventListener('submit', (e) => {
        e.preventDefault();
        const site = nameInput.value.replace(/^-+|-+$/g, '');
        nameInput.value = site;
        if (!/^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$/.test(site)) {
          return fail('Names are 1-63 letters, digits and hyphens');
        }
        clearError();

        const form = new FormData();
        form.append('site', site);
        // The filename of each part carries the file's site-relative
        // path — the deploy API reconstructs the folder from it.
        for (const { path, file } of picked) form.append('files', file, path);

        launching = true;
        launchBtn.disabled = true;
        nameInput.disabled = true;
        launchBtn.textContent = 'Launching';

        const done = (ok, message) => {
          launching = false;
          launchBtn.disabled = false;
          nameInput.disabled = false;
          launchBtn.textContent = 'Launch';
          if (!ok) return fail(message);
          const url = 'https://' + site + '.' + location.host + '/';
          const link = $('liveurl');
          link.href = url;
          link.textContent = url;
          show(live);
          confetti();
        };

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/deploy');
        xhr.responseType = 'json';
        xhr.upload.addEventListener('progress', (ev) => {
          if (ev.lengthComputable) {
            launchBtn.textContent = Math.min(99, Math.round((ev.loaded / ev.total) * 100)) + '%';
          }
        });
        xhr.addEventListener('load', () => {
          if (xhr.status === 200) return done(true);
          done(false, (xhr.response && xhr.response.error) || 'deploy failed (HTTP ' + xhr.status + ')');
        });
        xhr.addEventListener('error', () => done(false, 'Network error — could not reach the deploy API'));
        xhr.send(form);
      });

      // --- confetti -----------------------------------------------------------
      const confetti = () => {
        if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const colors = ['#ffffff', '#ffd23f', '#3ddc68', '#ff5d5d', '#4cc9f0', '#f7258b', '#ff9f1c'];
        const box = $('confetti');
        box.replaceChildren();
        for (let i = 0; i < 110; i++) {
          const piece = document.createElement('i');
          const size = 6 + Math.random() * 9;
          piece.style.cssText =
            'left:' + (Math.random() * 100) + 'vw;' +
            'width:' + size + 'px;' +
            'height:' + (size * (Math.random() < .5 ? 1 : .45)) + 'px;' +
            'background:' + colors[i % colors.length] + ';' +
            'border-radius:' + (Math.random() < .3 ? '50%' : '2px') + ';' +
            'transform:rotate(' + (Math.random() * 360) + 'deg);' +
            '--spin:' + (360 + Math.random() * 540) + 'deg;' +
            'animation-duration:' + (2.4 + Math.random() * 1.8) + 's;' +
            'animation-delay:' + (Math.random() * .5) + 's;';
          box.appendChild(piece);
        }
        setTimeout(() => box.replaceChildren(), 5200);
      };

      show(idle);
    })();
  </script>
</body>
</html>
