# Mesh deployment overlay.
#
# Peer-IP identity only works if spot-api sees the caller's real mesh
# source IP. Docker bridge publishing hides that behind the Docker
# gateway, so the mesh overlay runs spot-api on the host network.
#
# Usage (requires one mesh provider's env vars in .env):
#
#   docker compose -f docker-compose.yml -f docker-compose.mesh.yml up -d --build
#
# Publish SPOT_MESH_DOMAIN and *.SPOT_MESH_DOMAIN to this host's mesh IP.

services:
  rustfs:
    ports: !override
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  spot-api:
    network_mode: host
    ports: !override []
    environment:
      SPOT_DOMAIN: "${SPOT_MESH_DOMAIN:-spot.test}"
      SPOT_S3_ENDPOINT: "127.0.0.1:9000"
      SPOT_TRUSTED_PROXIES: "${SPOT_TRUSTED_PROXIES:-127.0.0.1/32,::1/128}"
      SPOT_DEV_IDENTITY_EMAIL: ""
