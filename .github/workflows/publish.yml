name: Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

# Least privilege: image push needs packages:write; the release job adds
# contents:write at the job level (tags only).
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: spot-api
            context: ./server
          - name: spot-caddy
            context: ./caddy
    steps:
      - uses: actions/checkout@v4

      # QEMU is needed because the spot-api final stage RUNs in the target arch.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          # main push -> :edge (+ :sha-xxxxxxx); v* tag -> :X.Y.Z, :X.Y, :latest.
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  release:
    name: GitHub Release
    needs: images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with changelog
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            range="${prev}..${TAG}"
          else
            range="${TAG}"
          fi
          {
            echo "## Changes"
            echo
            git log --no-merges --pretty='- %s (%h)' "$range"
            echo
            echo "## Images"
            echo
            echo '```'
            echo "docker pull ghcr.io/${OWNER}/spot-api:${TAG#v}"
            echo "docker pull ghcr.io/${OWNER}/spot-caddy:${TAG#v}"
            echo '```'
          } > notes.md
          gh release create "$TAG" --title "$TAG" --notes-file notes.md
