<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spot demo guestbook</title>
  <style>
    body { font: 16px/1.6 system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; padding: 0 1rem; }
    li { margin: 0.4rem 0; }
    input { padding: 0.4rem; width: 60%; }
    button { padding: 0.4rem 0.8rem; }
  </style>
</head>
<body>
  <h1>Spot demo guestbook</h1>
  <p id="who">Resolving who you are…</p>
  <form id="form">
    <input id="message" placeholder="Leave a message" required>
    <button>Sign</button>
  </form>
  <ul id="entries"></ul>

  <script src="/spot.js"></script>
  <script>
    const entries = spot.db.collection('entries');
    const list = document.getElementById('entries');

    // Stored data is rendered as text, never as HTML.
    function entryItem(d) {
      const li = document.createElement('li');
      const from = document.createElement('strong');
      from.textContent = `${d.data.from || 'someone'}:`;
      li.append(from, ` ${d.data.message}`);
      return li;
    }

    async function render() {
      const docs = await entries.list();
      list.replaceChildren(...docs.map(entryItem));
    }

    // New entries appear live for every visitor, including this one —
    // submitting does not re-render, the subscription does.
    entries.subscribe({
      onCreate: (doc) => list.prepend(entryItem(doc)),
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('message');
      const me = await spot.me().catch(() => null);
      await entries.create({ message: input.value, from: me ? me.name : null });
      input.value = '';
    });

    spot.me()
      .then((me) => { document.getElementById('who').textContent = `Hi ${me.name} (${me.email})`; })
      .catch(() => { document.getElementById('who').textContent = 'Identity unavailable (no mesh resolver configured).'; });

    render();
  </script>
</body>
</html>
