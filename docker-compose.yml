name: spot

services:
  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:1.0.0-beta.8}
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - rustfs-data:/data
    restart: unless-stopped

  spot-api:
    build: ./server
    environment:
      SPOT_STORAGE_MODE: ${SPOT_STORAGE_MODE:-s3}
      SPOT_DATA_DIR: /data
      SPOT_SQLITE_PATH: ${SPOT_SQLITE_PATH:-/data/spot.db}
      SPOT_DOMAIN: ${SPOT_DOMAIN:-spot.localhost}
      SPOT_AUTH_MODE: ${SPOT_AUTH_MODE:-}
      SPOT_S3_ENDPOINT: ${SPOT_S3_ENDPOINT:-rustfs:9000}
      SPOT_S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      SPOT_S3_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      SPOT_UPLOADS_BUCKET: ${SPOT_UPLOADS_BUCKET:-spot-uploads}
      SPOT_SITES_BUCKET: ${SPOT_SITES_BUCKET:-spot-sites}
      NETBIRD_API_URL: ${NETBIRD_API_URL:-}
      NETBIRD_API_TOKEN: ${NETBIRD_API_TOKEN:-}
      TAILSCALE_API_URL: ${TAILSCALE_API_URL:-}
      TAILSCALE_API_TOKEN: ${TAILSCALE_API_TOKEN:-}
      TAILSCALE_TAILNET: ${TAILSCALE_TAILNET:-}
      TAILSCALE_OAUTH_CLIENT_ID: ${TAILSCALE_OAUTH_CLIENT_ID:-}
      TAILSCALE_OAUTH_CLIENT_SECRET: ${TAILSCALE_OAUTH_CLIENT_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      SPOT_AI_MODEL: ${SPOT_AI_MODEL:-}
      SPOT_AI_ALLOWED_MODELS: ${SPOT_AI_ALLOWED_MODELS:-}
      SPOT_AI_ACCESS: ${SPOT_AI_ACCESS:-owners}
      SPOT_TRUSTED_PROXIES: ${SPOT_TRUSTED_PROXIES:-127.0.0.1/32,::1/128}
      SPOT_ADMIN_EMAILS: ${SPOT_ADMIN_EMAILS:-}
      SPOT_ADMIN_GROUPS: ${SPOT_ADMIN_GROUPS:-}
      SPOT_DEV_IDENTITY_EMAIL: ${SPOT_DEV_IDENTITY_EMAIL:-dev@spot.local}
      SPOT_DEV_IDENTITY_NAME: ${SPOT_DEV_IDENTITY_NAME:-Spot Dev}
      SPOT_DEV_IDENTITY_GROUPS: ${SPOT_DEV_IDENTITY_GROUPS:-}
      SPOT_SINGLE_USER_EMAIL: ${SPOT_SINGLE_USER_EMAIL:-owner@spot.local}
      SPOT_SINGLE_USER_NAME: ${SPOT_SINGLE_USER_NAME:-Spot Owner}
      SPOT_SINGLE_USER_GROUPS: ${SPOT_SINGLE_USER_GROUPS:-}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - spot-data:/data
    depends_on:
      - rustfs
    restart: unless-stopped

volumes:
  rustfs-data:
  spot-data:
