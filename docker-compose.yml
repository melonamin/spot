name: quick

services:
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data

  rclone-init:
    image: rclone/rclone:latest
    environment: &rclone-env
      RCLONE_CONFIG_RUSTFS_TYPE: s3
      RCLONE_CONFIG_RUSTFS_PROVIDER: Minio
      RCLONE_CONFIG_RUSTFS_ENDPOINT: http://rustfs:9000
      RCLONE_CONFIG_RUSTFS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RCLONE_CONFIG_RUSTFS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RCLONE_CONFIG_RUSTFS_FORCE_PATH_STYLE: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rclone lsd rustfs: >/dev/null 2>&1; do sleep 1; done
        rclone mkdir rustfs:quick-sites
        rclone mkdir rustfs:quick-uploads
    depends_on:
      - rustfs
    restart: "no"

  rclone-mount:
    image: rclone/rclone:latest
    environment: *rclone-env
    # The bind target is itself a mount point, so rclone needs
    # --allow-non-empty to stack the FUSE mount on top of it (stacking on
    # the rshared bind is what propagates the mount to the host and into
    # the caddy container). The conditional fusermount only clears a
    # dangling FUSE mount left by an unclean stop — it must never touch
    # the bind itself, or the mount ends up private to this container.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if grep -q ' /mnt/sites .* fuse\.rclone ' /proc/self/mountinfo; then
            fusermount3 -uz /mnt/sites
        fi
        exec rclone mount rustfs:quick-sites /mnt/sites \
          --allow-other --allow-non-empty --read-only \
          --dir-cache-time=5s --attr-timeout=5s
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      - type: bind
        source: ./data/sites
        target: /mnt/sites
        bind:
          propagation: rshared
    depends_on:
      rclone-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: quick
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quick}
      POSTGRES_DB: quick
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quick -d quick"]
      interval: 2s
      timeout: 3s
      retries: 30

  quick-api:
    build: ./server
    environment:
      DATABASE_URL: postgres://quick:${POSTGRES_PASSWORD:-quick}@postgres:5432/quick?sslmode=disable
      QUICK_DOMAIN: ${QUICK_DOMAIN:-quick.localhost}
      QUICK_SITES_DIR: /srv/sites
      NETBIRD_API_URL: ${NETBIRD_API_URL:-}
      NETBIRD_API_TOKEN: ${NETBIRD_API_TOKEN:-}
    volumes:
      # Same FUSE-propagated view as Caddy; _access.json policies are
      # read from here.
      - type: bind
        source: ./data/sites
        target: /srv/sites
        bind:
          propagation: rslave
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "8443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sdk:/srv/sdk:ro
      - caddy-data:/data
      - type: bind
        source: ./data/sites
        target: /srv/sites
        bind:
          propagation: rslave
    depends_on:
      - quick-api
      - rclone-mount
    restart: unless-stopped

volumes:
  rustfs-data:
  pg-data:
  caddy-data:
